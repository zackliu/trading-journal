appId: com.tradingjournal.app
productName: TradingJournal
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
extraResources:
  - from: build/icon.ico
    to: icon.ico
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/sharp/**"
  - "**/node_modules/@img/**"
win:
  icon: build/icon.ico
  target:
    - nsis
    - dir
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-Setup.${ext}
  shortcutName: TradingJournal
  deleteAppDataOnUninstall: false

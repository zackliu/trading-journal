name: Release

# Push a version tag (e.g. v0.1.0), or run manually, to build the Windows
# installer and publish it to a GitHub Release.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release tag
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $releaseTag = "v$version"

          if ("${{ github.ref_type }}" -eq "tag") {
            $releaseTag = "${{ github.ref_name }}"
            $tagVersion = $releaseTag -replace '^v', ''
            if ($version -ne $tagVersion) {
              throw "Tag $releaseTag does not match package.json version $version. Bump the version and re-tag."
            }
          }

          "RELEASE_TAG=$releaseTag" >> $env:GITHUB_ENV
          Write-Host "Release tag: $releaseTag"

      - name: Build
        run: npm run build

      - name: Package Windows installer
        run: npx electron-builder --win nsis --publish never

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: TradingJournal-Setup
          path: dist/*-Setup.exe
          if-no-files-found: error

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          files: dist/*-Setup.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
          overwrite_files: true
